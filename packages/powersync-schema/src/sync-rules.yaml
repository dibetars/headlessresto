# RestaurantOS PowerSync Sync Rules
# Defines what data syncs to each client device.
# PowerSync evaluates these rules per-user based on their JWT claims.
#
# To apply: upload this file to your PowerSync instance dashboard.

bucket_definitions:

  # Location-scoped operational data
  # Syncs to any authenticated user who has access to the location.
  by_location:
    parameters:
      - SELECT id AS location_id FROM locations
        WHERE id IN (SELECT user_location_ids())
    data:
      # Full menu — staff need it offline for POS
      - SELECT * FROM menu_items WHERE location_id = bucket.location_id

      # Stock (current quantities only — movements are write-only)
      - SELECT * FROM stock_items WHERE location_id = bucket.location_id

      # Stock movements (last 7 days for offline POS reconciliation)
      - SELECT * FROM stock_movements WHERE location_id = bucket.location_id
        AND created_at > NOW() - INTERVAL '7 days'

      # Orders (last 24 hours — KDS and POS need recent context)
      - SELECT * FROM orders WHERE location_id = bucket.location_id
        AND created_at > NOW() - INTERVAL '24 hours'

      # Attendance (last 48 hours — for clock-in/out state)
      - SELECT * FROM attendance_logs WHERE location_id = bucket.location_id
        AND logged_at > NOW() - INTERVAL '48 hours'

      # Schedules (today + next 7 days)
      - SELECT * FROM staff_schedules WHERE location_id = bucket.location_id
        AND shift_date >= CURRENT_DATE - 1

      # Today's and future published daily menus
      - SELECT * FROM daily_menus WHERE location_id = bucket.location_id
        AND menu_date >= CURRENT_DATE

      # Active coupons
      - SELECT * FROM coupons WHERE location_id = bucket.location_id
        AND is_active = true
        AND valid_until >= NOW()

  # Active delivery data (for mobile driver app)
  by_active_delivery:
    parameters:
      - SELECT id AS location_id FROM locations
        WHERE id IN (SELECT user_location_ids())
    data:
      - SELECT d.* FROM deliveries d
        JOIN orders o ON d.order_id = o.id
        WHERE o.location_id = bucket.location_id
          AND d.status NOT IN ('delivered', 'cancelled', 'failed')

  # Org-level data (settings, location list, memberships)
  by_org:
    parameters:
      - SELECT id AS org_id FROM organizations
        WHERE id IN (SELECT user_org_ids())
    data:
      - SELECT id, org_id, name, address, city, state, zip,
               timezone, operating_hours, is_active
        FROM locations WHERE org_id = bucket.org_id

      - SELECT id, user_id, org_id, location_id, role, is_active
        FROM org_memberships WHERE org_id = bucket.org_id AND is_active = true
